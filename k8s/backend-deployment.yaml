apiVersion: apps/v1
kind: Deployment
metadata:
  name: learn2earn-backend
  namespace: learn2earn
spec:
  replicas: 2
  selector:
    matchLabels:
      app: learn2earn-backend
  template:
    metadata:
      labels:
        app: learn2earn-backend
    spec:
      initContainers:
        - name: migrate
          image: your-registry/learn2earn-backend:v1.0.0
          command: ["python", "manage.py", "migrate", "--noinput"]
          envFrom:
            - configMapRef:
                name: learn2earn-config
            - secretRef:
                name: learn2earn-secrets
      containers:
        - name: backend
          image: your-registry/learn2earn-backend:v1.0.0
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /api/events/
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          envFrom:
            - configMapRef:
                name: learn2earn-config
            - secretRef:
                name: learn2earn-secrets
