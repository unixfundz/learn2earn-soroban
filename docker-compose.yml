version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: learn2earn
      POSTGRES_USER: learn2earn
      POSTGRES_PASSWORD: learn2earn
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./django-backend
    env_file:
      - ./django-backend/.env
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./django-backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    build:
      context: ./django-backend
    env_file:
      - ./django-backend/.env
    command: celery -A learn2earn.core worker -Q default,webhooks,backfill -l INFO
    volumes:
      - ./django-backend:/app
    depends_on:
      - backend
      - redis

  beat:
    build:
      context: ./django-backend
    env_file:
      - ./django-backend/.env
    command: celery -A learn2earn.core beat -l INFO
    volumes:
      - ./django-backend:/app
    depends_on:
      - backend
      - redis

volumes:
  postgres_data:
